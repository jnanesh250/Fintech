<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - FinFlow</title>
  <style>
    body{font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;background:#f7fafc;color:#2d3748;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .card{background:#fff;padding:2rem;border-radius:12px;box-shadow:0 10px 30px rgba(16,24,40,0.08);width:380px}
    h1{margin-bottom:0.5rem;font-size:1.4rem}
    p.sub{margin-bottom:1.2rem;color:#718096}
    label{display:block;margin-top:0.8rem;font-size:0.9rem}
    input[type="email"],input[type="password"]{width:100%;padding:0.75rem;border:1px solid #e2e8f0;border-radius:8px;margin-top:0.4rem}
    .actions{display:flex;gap:0.5rem;margin-top:1rem}
    .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:0.75rem 1rem;border-radius:8px;cursor:pointer;flex:1}
    .link{display:block;text-align:center;margin-top:1rem;color:#667eea;text-decoration:none}
    .register-opt{margin-top:0.8rem;text-align:center;color:#4a5568}
    .register-opt a{color:#667eea;text-decoration:none;font-weight:600}
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p class="sub">Enter your credentials to continue</p>
    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required />
      <div class="actions">
        <button type="submit" class="btn-primary">Sign In</button>
      </div>
    </form>

    <div class="register-opt">Don't have an account? <a href="register.html">Register</a></div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api'; // Fintech DB API endpoint

    document.getElementById('loginForm').addEventListener('submit', async function(e){
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        });

        const data = await response.json();

        if (response.ok) {
          // Store auth token if provided
          if (data.token) {
            localStorage.setItem('authToken', data.token);
          }
          alert('Signed in successfully. Redirecting to homepage.');
          window.location.href = 'index.html';
        } else {
          alert('Error: ' + (data.message || 'Login failed'));
        }
      } catch (error) {
        alert('Error connecting to server: ' + error.message);
      }
    });
  </script>
</body>
</html>
